# Novais Digital Brand Guide — fonte canônica usada pelo Designer Agent + Brand Validator
# Extraído de screencast de referência via análise multimodal (Sonnet 4.6 vision) — asset não incluído no repo público
# Versão estruturada de documentacao/BRAND_GUIDE.md

version: 1.0.0
brand_name: Novais Digital
logo_wordmark: "NOVAIS"
tagline: "Você foca no produto. A gente cuida da sua presença digital."

# ─── Identidade visual ────────────────────────────────────────────

colors:
  primary:
    navy_deep:       "#0A1628"  # Background principal (hero, footer)
    royal_blue:      "#2563EB"  # Destaques de texto, links, ênfase
    cyan_accent:     "#5EEAD4"  # Subtítulos em destaque, gradientes
    white:           "#FFFFFF"  # Texto sobre fundo escuro
  secondary:
    off_white:       "#F5F7FA"  # Background seções claras
    text_secondary:  "#6B7280"  # Texto descritivo
    card_bg_dark:    "#0F1B2D"  # Cards sobre dark
  status:
    badge_red:       "#DC2626"  # BETA, urgência
    badge_green:     "#10B981"  # 100% conformidade, sucesso

  # Política de tolerância (ADR-004-DS)
  tolerance:
    exact_match_required: 100  # >= 99% para aceitar sem warning
    warning_threshold:    96   # 96-98% loga warning mas aceita
    rejection_threshold:  96   # < 96% refaz 1x; se falhar, fallback Ideogram

# ─── Tipografia ───────────────────────────────────────────────────

typography:
  headings:
    family: "Inter"
    weights: [800, 900]  # ExtraBold + Black
    letter_spacing: "tight"
  body:
    family: "Inter"
    weights: [400, 500]  # Regular + Medium
    letter_spacing: "normal"
  logo:
    family: "Inter"
    weight: 700
    letter_spacing: "0.05em"  # ligeiramente expandido
    transform: "uppercase"

  fallback_families: ["Manrope", "Geist", "system-ui"]

# ─── Composição e layout ──────────────────────────────────────────

composition:
  alignment: center
  whitespace: generous
  corner_radius:
    cards: 16
    buttons: 9999  # pill (totalmente arredondado)
    badges: 12

  dividers:
    style: "angular_v_cut"  # signature visual da marca
    direction: "navy_to_white_and_reverse"

  effects:
    radial_glow:
      enabled: true
      color: "#2563EB"
      opacity: 0.15
      location: "sides"

  grid:
    hero_columns: 4   # Stats grid
    pillars_columns: 3
    footer_columns: 3

# ─── Botão CTA principal ──────────────────────────────────────────

cta_button:
  shape: pill
  gradient:
    from: "#2563EB"
    to: "#5EEAD4"
    direction: "90deg"
  text_color: "#FFFFFF"
  text_weight: 600
  icon_right: "arrow-right"  # →
  padding: "16px 32px"

# ─── Iconografia ──────────────────────────────────────────────────

iconography:
  style: outline
  color_primary: "#2563EB"
  color_on_dark: "#5EEAD4"
  stroke_width: 1.5
  size_default: 24
  bg_circle: true  # ícones sobre fundo light_blue circular

# ─── Modo dark vs light ───────────────────────────────────────────

mode_alternation:
  enabled: true
  rule: "alternate_per_section"
  dark_sections:
    - hero
    - footer
    - cta_final
    - testimonials
  light_sections:
    - about
    - pillars
    - features
    - governance

# ─── Tom de voz visual (correlação com tom verbal) ────────────────
# Para carrosséis seguindo the CEO: usar dark mode dominante,
# cyan_accent nos números e palavras-chave do hook.
# Brand validator deve checar essa correlação.

# ─── Anti-patterns visuais ────────────────────────────────────────

avoid:
  - "Cores fora da paleta primary/secondary"
  - "Tipografia serif ou decorativa"
  - "Cantos retos (não arredondados)"
  - "Botões retangulares (não pill)"
  - "Gradientes com cores não-brand"
  - "Stock photos genéricas (preferir ilustrações ou fotos com brand-aligned color treatment)"
  - "Texto em CAIXA ALTA além do logo"
  - "Tipografia decorativa em headings"

# ─── Validação automática (referência para BrandValidator) ────────

validator_rules:
  color_palette_only:
    rule: "Imagens devem usar exclusivamente cores listadas em colors.primary e colors.secondary"
    score_weight: 0.4

  typography_inter_only:
    rule: "Texto em imagens deve usar Inter (ou fallbacks listados)"
    score_weight: 0.3

  composition_centered:
    rule: "Layout centralizado com whitespace generoso"
    score_weight: 0.2

  rounded_corners:
    rule: "Elementos com cantos arredondados conforme corner_radius"
    score_weight: 0.1

# ─── Exemplos canônicos ───────────────────────────────────────────

examples_on_brand:
  # Frames de referência do screencast original (removidos do repo público).
  # Ao aplicar a uma marca real, aponte reference_path para frames do seu screencast.
  - description: "Hero da landing (frame de referência — asset não incluído)"
    reference_path: "brand_extraction/frames/frame_001.jpg"
    brand_score: 1.0

# ─── Metadados ────────────────────────────────────────────────────

metadata:
  extracted_from: "screencast de referência (assets não incluídos no repo público)"
  extraction_date: "2026-05-13"
  extraction_method: "FFmpeg + Whisper + Claude Sonnet 4.6 vision multimodal"
  confidence: "high (frames diretos do screencast de referência)"
  next_review_date: "2026-08-13"
  validated_by: "founder approval pending"
